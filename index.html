<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>GII 2025 Dashboard</title>
  <style>
    html,body{height:100%;margin:0;background:#f8fafc;font-family:system-ui,-apple-system,sans-serif}
    #dashboard{display:block;width:100%;height:100%;border:0;background:#f8fafc}
    #loader{position:fixed;inset:0;z-index:10;display:flex;align-items:center;justify-content:center;background:#f8fafc;color:#475569;font-size:13px}
    #loader.hidden{display:none}
  </style>
</head>
<body>
  <div id="loader">Dashboard və GitHub məlumatları yüklənir…</div>
  <iframe id="dashboard" src="app.html" title="GII 2025 Dashboard"></iframe>
  <script>
    const frame=document.getElementById('dashboard');
    const loader=document.getElementById('loader');
    frame.addEventListener('load',()=>{
      try{
        const script=frame.contentDocument.createElement('script');
        script.src=`github-sync.js?v=${Date.now()}`;
        script.onload=()=>loader.classList.add('hidden');
        script.onerror=()=>{loader.textContent='GitHub sinxronizasiya modulu yüklənmədi.'};
        frame.contentDocument.body.appendChild(script);
      }catch(error){
        loader.textContent=`Dashboard başladılmadı: ${error.message}`;
      }
    });
  </script>
</body>
</html>
