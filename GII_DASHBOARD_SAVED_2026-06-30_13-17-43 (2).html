<!DOCTYPE html>
<html lang="az"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>GII 2025 Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#f8fafc;min-height:100vh}
.card{background:#fff;border-radius:10px;border:1px solid #e2e8f0;overflow:hidden}
.card-hd{padding:11px 15px;border-bottom:1px solid #f1f5f9;font-weight:600;font-size:13px;color:#0f172a;display:flex;align-items:center;justify-content:space-between}
.lbl{font-size:10px;color:#64748b;font-weight:600;display:block;margin-bottom:3px;text-transform:uppercase;letter-spacing:.05em}
.inp{padding:5px 8px;border:1px solid #e2e8f0;border-radius:5px;font-size:12px;color:#1e293b;background:#fff}
.sel{padding:5px 8px;border:1px solid #e2e8f0;border-radius:5px;font-size:12px;color:#1e293b;background:#fff}
.btn{padding:6px 13px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;border:none}
.btn-sm{padding:3px 9px;font-size:11px}
.btn-blue{background:#2563eb;color:#fff}.btn-red{background:#ef4444;color:#fff}
.btn-green{background:#16a34a;color:#fff}.btn-gray{background:#f1f5f9;color:#475569}
.btn:disabled{background:#e2e8f0;color:#94a3b8;cursor:not-allowed}
.bdg{padding:2px 7px;border-radius:4px;font-size:11px;font-weight:600;display:inline-block}
.bdg-green{background:#f0fdf4;color:#16a34a}.bdg-red{background:#fef2f2;color:#dc2626}
.bdg-yellow{background:#fffbeb;color:#d97706}.bdg-blue{background:#eff6ff;color:#2563eb}
.bdg-purple{background:#f5f3ff;color:#7c3aed}.bdg-gray{background:#f1f5f9;color:#64748b}
.pbar-w{background:#f1f5f9;border-radius:99px;overflow:hidden;min-width:60px}
.pbar-f{border-radius:99px;transition:width .3s}
.chip{font-weight:700;font-size:13px;padding:2px 8px;border-radius:6px;display:inline-block}
table{width:100%;border-collapse:collapse}
th{padding:7px 11px;text-align:left;color:#64748b;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.04em;background:#f8fafc;border-bottom:1px solid #e2e8f0}
td{padding:8px 11px;color:#334155;border-bottom:1px solid #f8fafc;font-size:12px}
.header{background:#fff;border-bottom:1px solid #e2e8f0;position:sticky;top:0;z-index:50;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.header-top{max-width:1200px;margin:0 auto;padding:10px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.header-tabs{max-width:1200px;margin:0 auto;padding:0 20px;display:flex;overflow-x:auto}
.tab-btn{padding:8px 14px;font-size:12px;font-weight:500;border:none;background:none;cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;color:#64748b;transition:color .15s}
.tab-btn.active{border-bottom-color:#2563eb;color:#2563eb}
.content{max-width:1200px;margin:0 auto;padding:22px 20px}
.g3{display:grid;grid-template-columns:2fr 1fr 1fr;gap:16px}
.g5{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g3s{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.fc{display:flex;flex-direction:column;gap:14px}
.f{display:flex;flex-wrap:wrap}
.ai{align-items:center}.ae{align-items:flex-end}.ab{align-items:baseline}
.jb{justify-content:space-between}.jc{justify-content:center}
.ovx{overflow-x:auto}
.warn{background:#fffbeb;border:1px solid #fcd34d;border-radius:8px;padding:11px 15px;display:flex;gap:10px}
.ok-box{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:12px}
@media(max-width:768px){.g3,.g3s{grid-template-columns:1fr}.g5{grid-template-columns:repeat(2,1fr)}.g2{grid-template-columns:1fr}}
</style>
</head>

        const raw=sv!==undefined?sv:(ind.mode==='api'&&ind.apiFetchedRaw!=null?ind.apiFetchedRaw:ind.rawValue);
        const mn=ind.mode==='api'&&ind.apiFetchedMin!=null?ind.apiFetchedMin:ind.minValue;
        const mx=ind.mode==='api'&&ind.apiFetchedMax!=null?ind.apiFetchedMax:ind.maxValue;
        if(raw===''||raw==null)return{score:null,st:'no_raw',raw,mn,mx};
        if(mn===''||mn==null)return{score:null,st:'no_min',raw,mn,mx};
        if(mx===''||mx==null)return{score:null,st:'no_max',raw,mn,mx};
        const n=mmn(raw,mn,mx);if(n==='ZR')return{score:null,st:'zero_range',raw,mn,mx};
        return{score:n,st:'ok',raw,mn,mx};
      });
      const vs=id.filter(d=>d.score!=null).map(d=>d.score);
      return{id,avg:vavg(vs),vc:vs.length,nc:id.filter(d=>d.st==='na').length,tc:id.length};
    });
    const sa=sd.map(s=>s.avg).filter(a=>a!=null);
    return{sd,avg:vavg(sa),vsc:sa.length,tsc:sd.length};
  });
  const ia=pd.slice(0,5).map(p=>p.avg).filter(a=>a!=null);
  const oa=pd.slice(5,7).map(p=>p.avg).filter(a=>a!=null);
  const inp=vavg(ia),out=vavg(oa),gii=vavg([inp,out].filter(a=>a!=null));
  const tot=pillars.reduce((a,p)=>a+p.subPillars.reduce((b,sp)=>b+sp.indicators.length,0),0);
  const naC=pillars.reduce((a,p)=>a+p.subPillars.reduce((b,sp)=>b+sp.indicators.filter(i=>i.mode==='na').length,0),0);
  const has=pillars.reduce((a,p)=>a+p.subPillars.reduce((b,sp)=>b+sp.indicators.filter(i=>{
    if(i.mode==='na')return false;
    const r=i.mode==='api'&&i.apiFetchedRaw!=null?i.apiFetchedRaw:i.rawValue;
    return r!==''&&r!=null;
  }).length,0),0);
  return{pd,inp,out,gii,tot,naC,has};
};

// UTF-8-safe Base64 helpers. Byte processing is chunked to support large snapshots.
function encodeUtf8ToBase64(value){
  const bytes=new TextEncoder().encode(String(value));
  const chunkSize=0x8000;
  let binary='';
  for(let i=0;i<bytes.length;i+=chunkSize){
    binary+=String.fromCharCode.apply(null,bytes.subarray(i,i+chunkSize));
  }
  return btoa(binary);
}
function decodeBase64ToUtf8(value){
  const binary=atob(String(value));
  const bytes=new Uint8Array(binary.length);
  for(let i=0;i<binary.length;i++)bytes[i]=binary.charCodeAt(i);
  return new TextDecoder('utf-8',{fatal:true}).decode(bytes);
}

const isObject=value=>value!==null&&typeof value==='object'&&!Array.isArray(value);
const safeString=(value,fallback='')=>typeof value==='string'?value:fallback;

function normalizeIndicator(ind,pi,si,ii){
  const base=mkInd(pi,si,ii),src=isObject(ind)?ind:{};
  const mode=['manual','api','na'].includes(src.mode)?src.mode:'manual';
  const apiStatus=src.apiStatus==='fetching'?null:(['success','error'].includes(src.apiStatus)?src.apiStatus:null);
  return{
    ...base,...src,
    id:safeString(src.id,base.id)||base.id,
    name:safeString(src.name,base.name),
    mode,
    rawValue:src.rawValue??'',minValue:src.minValue??'',maxValue:src.maxValue??'',
    apiEndpoint:safeString(src.apiEndpoint,''),apiRawPath:safeString(src.apiRawPath,''),
    apiMinPath:safeString(src.apiMinPath,''),apiMaxPath:safeString(src.apiMaxPath,''),
    apiStatus,apiError:src.apiError==null?null:String(src.apiError),
    apiFetchedRaw:src.apiFetchedRaw??null,apiFetchedMin:src.apiFetchedMin??null,apiFetchedMax:src.apiFetchedMax??null
  };
}
function normalizeSavedState(savedState){
  const defaults=defaultState(),src=isObject(savedState)?savedState:{};
  const sourcePillars=Array.isArray(src.pillars)&&src.pillars.length?src.pillars:defaults.pillars;
  const pillars=sourcePillars.map((pillar,pi)=>{
    const base=mkPillar(pi),p=isObject(pillar)?pillar:{};
    const sourceSubs=Array.isArray(p.subPillars)&&p.subPillars.length?p.subPillars:base.subPillars;
    return{
      ...base,...p,
      id:safeString(p.id,base.id)||base.id,
      name:safeString(p.name,base.name),
      subPillars:sourceSubs.map((sub,si)=>{
        const baseSub=mkSp(pi,si),sp=isObject(sub)?sub:{};
        const sourceIndicators=Array.isArray(sp.indicators)&&sp.indicators.length?sp.indicators:baseSub.indicators;
        return{
          ...baseSub,...sp,
          id:safeString(sp.id,baseSub.id)||baseSub.id,
          name:safeString(sp.name,baseSub.name),
          indicators:sourceIndicators.map((ind,ii)=>normalizeIndicator(ind,pi,si,ii))
        };
      })
    };
  });
  const maxPi=Math.max(0,pillars.length-1);
  const selPi=Math.min(maxPi,Math.max(0,Number.isInteger(+src.selPi)?+src.selPi:0));
  const maxSi=Math.max(0,(pillars[selPi]?.subPillars?.length||1)-1);
  const selSi=Math.min(maxSi,Math.max(0,Number.isInteger(+src.selSi)?+src.selSi:0));
  const wgSource=isObject(src.wgF)?src.wgF:{};
  const wgF={...defaultWgFilters()};
  Object.keys(wgF).forEach(key=>{if(typeof wgSource[key]==='string')wgF[key]=wgSource[key]});
  return{
    pillars,
    tab:VALID_TABS.has(src.tab)?src.tab:'overview',
    selPi,selSi,
    scenOver:isObject(src.scenOver)?src.scenOver:{},
    scenActive:typeof src.scenActive==='boolean'?src.scenActive:false,
    expP:isObject(src.expP)?src.expP:{},
    expC:isObject(src.expC)?src.expC:{},
    wgF
  };
}
function validatePortableSnapshot(snapshot){
  if(!isObject(snapshot))return false;
  if(![1,PORTABLE_SCHEMA_VERSION].includes(Number(snapshot.schemaVersion)))return false;
  if(!isObject(snapshot.state)||!Array.isArray(snapshot.state.pillars)||!snapshot.state.pillars.length)return false;
  return snapshot.state.pillars.every(p=>
    isObject(p)&&Array.isArray(p.subPillars)&&p.subPillars.length&&
    p.subPillars.every(sp=>isObject(sp)&&Array.isArray(sp.indicators)&&sp.indicators.length)
  );
}
function applyPortableSnapshot(snapshot){
  if(!validatePortableSnapshot(snapshot))throw new Error('Portable snapshot validation failed.');
  S={...S,...normalizeSavedState(snapshot.state),saveMsg:null};
  const parsedDate=snapshot.savedAt?new Date(snapshot.savedAt):null;
  lastSavedAt=parsedDate&&!Number.isNaN(parsedDate.getTime())?parsedDate:null;
  return true;
}
function buildPersistentState(){
  const raw={
    pillars:S.pillars,
    tab:S.tab,selPi:S.selPi,selSi:S.selSi,
    scenOver:S.scenOver,scenActive:S.scenActive,
    expP:S.expP,expC:S.expC,wgF:S.wgF
  };
  return JSON.parse(JSON.stringify(raw,(key,value)=>key==='apiStatus'&&value==='fetching'?null:value));
}
function buildPortableSnapshot(){
  return{
    schemaVersion:PORTABLE_SCHEMA_VERSION,
    savedAt:new Date().toISOString(),
    application:'GII 2025 Dashboard',
    state:buildPersistentState()
  };
}
function saveState(snapshot=buildPortableSnapshot(),markSaved=true){
  try{
    localStorage.setItem(LS_KEY,JSON.stringify(snapshot));
    if(markSaved)lastSavedAt=new Date(snapshot.savedAt);
    return true;
  }catch(error){
    console.error('Local backup save failed:',error);
    return false;
  }
}
function loadState(){
  try{
    const raw=localStorage.getItem(LS_KEY);
    if(!raw)return false;
    const parsed=JSON.parse(raw);
    const snapshot=isObject(parsed)&&isObject(parsed.state)
      ?parsed
      :{schemaVersion:1,savedAt:null,application:'GII 2025 Dashboard',state:parsed};
    if(!validatePortableSnapshot(snapshot))throw new Error('Stored state is invalid.');
    applyPortableSnapshot(snapshot);
    return true;
  }catch(error){
    console.warn('Local backup could not be loaded:',error);
    return false;
  }
}
function loadEmbeddedPortableState(){
  const container=document.getElementById('gii-portable-state');
  if(!container)return false;
  const encoded=(container.textContent||'').trim();
  if(!encoded)return false;
  try{
    if((container.dataset.encoding||'').toLowerCase()!=='base64')throw new Error('Unsupported portable-state encoding.');
    const snapshot=JSON.parse(decodeBase64ToUtf8(encoded));
    if(!validatePortableSnapshot(snapshot))throw new Error('Embedded portable state is invalid.');
    applyPortableSnapshot(snapshot);
    // The accepted embedded state is authoritative; localStorage is only refreshed afterward as a backup.
    saveState(snapshot,false);
    return true;
  }catch(error){
    console.warn('Embedded portable state could not be loaded; using fallback state:',error);
    return false;
  }
}
function commitActiveFormControl(){
  const active=document.activeElement;
  const candidate=active&&active.matches&&active.matches('input,select,textarea')?active:lastActiveEditable;
  if(!candidate||!candidate.isConnected||candidate.disabled)return;
  candidate.dispatchEvent(new Event('change',{bubbles:true}));
}
function buildExportFilename(date=new Date()){
  const pad=value=>String(value).padStart(2,'0');
  return `GII_DASHBOARD_SAVED_${date.getFullYear()}-${pad(date.getMonth()+1)}-${pad(date.getDate())}_${pad(date.getHours())}-${pad(date.getMinutes())}-${pad(date.getSeconds())}.html`;
}
function exportPortableHtml(snapshot){
  const encoded=encodeUtf8ToBase64(JSON.stringify(snapshot));
  const clonedDocumentElement=document.documentElement.cloneNode(true);
  const stateContainer=clonedDocumentElement.querySelector('#gii-portable-state');
  if(!stateContainer)throw new Error('Portable-state container is missing.');
  stateContainer.textContent=encoded;
  stateContainer.setAttribute('data-encoding','base64');
  // Runtime UI is rebuilt from the embedded state at startup; clearing it prevents transient notices from being embedded.
  const clonedApp=clonedDocumentElement.querySelector('#app');
  if(clonedApp)clonedApp.innerHTML='';
  const html='<!'+'DOCTYPE html>\n'+clonedDocumentElement.outerHTML;
  const blob=new Blob([html],{type:'text/html;charset=utf-8'});
  const objectUrl=URL.createObjectURL(blob);
  const anchor=document.createElement('a');
  anchor.href=objectUrl;
  anchor.download=buildExportFilename(new Date(snapshot.savedAt));
  anchor.style.display='none';
  document.body.appendChild(anchor);
  anchor.click();
  anchor.remove();
  setTimeout(()=>URL.revokeObjectURL(objectUrl),1500);
  return anchor.download;
}
function clearSaveMessageLater(){
  if(saveMsgTimer)clearTimeout(saveMsgTimer);
  saveMsgTimer=setTimeout(()=>{S.saveMsg=null;render()},4500);
}
window.doSave=()=>{
  try{
    commitActiveFormControl();
    const snapshot=buildPortableSnapshot();
    if(!saveState(snapshot,true))throw new Error('Local backup could not be saved.');
    lastSavedAt=new Date(snapshot.savedAt);
    S.saveMsg='save_ok';
  }catch(error){
    console.error('Local save failed:',error);
    S.saveMsg='save_err';
  }
  render();
  clearSaveMessageLater();
};
window.doExportHtml=()=>{
  try{
    commitActiveFormControl();
    const snapshot=buildPortableSnapshot();
    const backupSaved=saveState(snapshot,true);
    if(!backupSaved)console.warn('HTML export will continue without a localStorage backup.');
    exportPortableHtml(snapshot);
    lastSavedAt=new Date(snapshot.savedAt);
    S.saveMsg='export_ok';
  }catch(error){
    console.error('Portable HTML export failed:',error);
    S.saveMsg='export_err';
  }
  render();
  clearSaveMessageLater();
};
window.doResetToDefault=()=>{

function svgChart(pillars,pd){
  const W=560,H=180,pL=32,pR=10,pT=10,pB=42,bH=H-pT-pB,bW=W-pL-pR,n=pillars.length;
  const gap=bW/n,barW=Math.min(46,gap-6);
  const yLbls=[0,25,50,75,100];
  return`<svg width="100%" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">
    ${yLbls.map(v=>{const cy=pT+bH-(v/100)*bH;return`<line x1="${pL}" y1="${cy}" x2="${W-pR}" y2="${cy}" stroke="#f1f5f9" stroke-width="1"/><text x="${pL-4}" y="${cy+4}" text-anchor="end" font-size="9" fill="#94a3b8">${v}</text>`}).join('')}
    ${pillars.map((p,pi)=>{const val=pd[pi].avg,x=pL+pi*gap+(gap-barW)/2,bh=val!=null?Math.max(2,(val/100)*bH):2,y=pT+bH-bh,col=pi<5?'#3b82f6':'#8b5cf6',lbl=p.name.length>8?p.name.slice(0,8)+'…':p.name;return`<rect x="${x}" y="${y}" width="${barW}" height="${bh}" rx="3" fill="${col}" opacity="${val==null?.2:1}"/>${val!=null?`<text x="${x+barW/2}" y="${y-3}" text-anchor="middle" font-size="9" fill="${col}" font-weight="600">${val.toFixed(1)}</text>`:''}<text x="${x+barW/2}" y="${H-pB+14}" text-anchor="middle" font-size="9" fill="#64748b">${esc(lbl)}</text>`}).join('')}
  </svg>`;
}

  const gOpt=groups.map(g=>{const n=WG.filter(d=>d.groups.includes(g)).length;

  const miniT=list=>`<table><thead><tr><th>Kod</th><th>İndikator</th><th>Reytinq</th></tr></thead><tbody>${list.map(d=>`<tr><td style="white-space:nowrap"><b>${d.code}</b></td><td style="font-size:12px">${esc(d.name)}</td><td>${rchip(d.rank2025)}</td></tr>`).join('')||'<tr><td colspan="3" style="color:#94a3b8;font-size:12px">Məlumat yoxdur</td></tr>'}</tbody></table>`;
  const gBdg=g=>g===WG_NA?bdg('Yoxlanılmalı','yellow'):esc(g);
  return`<div class="fc">
  <div class="card"><div class="card-hd"><span>GII İndikatorları — İşçi Qrupları və Məsul Qurumlar üzrə (2025)</span>${bdg('MƏNBƏ: WIPO GII 2025 · az.pdf','blue')}</div>
    <div style="padding:11px 15px;font-size:12px;color:#64748b">Təsnifatın əsas istinad sahəsi <b>İşçi qrupu</b> sütunudur: hər indikator bu sütundakı faktiki dəyərə görə təsnif olunur. İşçi qrupu təyin edilməmiş indikatorlar boş buraxılmır — ayrıca «Yoxlanılmalı» qrupunda göstərilir. İcra orqanı və məsul şəxs siyahıları seçilmiş işçi qrupuna uyğun törədilir. 2025 bal/dəyər və reytinqlər WIPO-nun Azərbaycan ölkə profilindən götürülüb (139 iqtisadiyyat).</div></div>
  <div class="g5">
    ${[{l:'Göstərilən indikator',v:rows.length+(filtered?'/78':'')},{l:'İşçi qrupu',v:gd.length},{l:'Orta reytinq 2025',v:avgR==null?'n/a':avgR.toFixed(1),c:rc(avgR)},{l:'Məlumatsız (n/a)',v:naC,c:naC?'#d97706':'#0f172a'},{l:'Yoxlanılmalı qrup',v:verC,c:verC?'#dc2626':'#0f172a'}].map(({l,v,c})=>`<div class="card" style="padding:14px"><div class="lbl">${l}</div><div style="font-size:22px;font-weight:700;color:${c||'#0f172a'}">${v}</div></div>`).join('')}
  </div>
  <div class="card"><div class="card-hd"><span>Filtrlər — əsas sahə: İşçi qrupu</span>${filtered?`<button class="btn btn-sm btn-gray" onclick="wgReset()">Filtrləri sıfırla</button>`:''}</div>
    <div style="padding:13px 15px;display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px">
      <div><span class="lbl">İşçi qrupu (əsas)</span><select class="sel" style="width:100%" onchange="wgSet('group',this.value)"><option value="">Hamısı (78)</option>${gOpt}</select></div>
      <div><span class="lbl">İcra orqanı${f.group?' (qrup üzrə)':''}</span><select class="sel" style="width:100%" onchange="wgSet('org',this.value)"><option value="">Hamısı (${orgOpts.length})</option>${selOpt(orgOpts,f.org)}</select></div>
      <div><span class="lbl">Məsul şəxs${f.group?' (qrup üzrə)':''}</span><select class="sel" style="width:100%" onchange="wgSet('person',this.value)"><option value="">Hamısı (${personOpts.length})</option>${selOpt(personOpts,f.person)}</select></div>
      <div><span class="lbl">GII sütunu</span><select class="sel" style="width:100%" onchange="wgSet('pillar',this.value)"><option value="">Hamısı</option>${[1,2,3,4,5,6,7].map(p=>`<option value="${p}"${f.pillar===String(p)?' selected':''}>${p}. ${WG.find(d=>d.pillar===p).pillarName}</option>`).join('')}</select></div>
      <div><span class="lbl">Axtarış (kod / ad)</span><input id="wgQ" class="inp" style="width:100%" value="${esc(f.q)}" oninput="wgSet('q',this.value)" placeholder="məs.: 5.2.4 və ya klaster"></div>
    </div></div>
  <div class="g2" style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
    <div class="card"><div class="card-hd">İşçi qrupları üzrə bölgü${filtered?' (filtrə əsasən)':''}</div><div class="ovx"><table>
      <thead><tr><th>İşçi qrupu</th><th>İndikator</th><th>Orta reytinq</th><th style="min-width:90px">Pay</th></tr></thead>
      <tbody>${gd.map(x=>`<tr><td style="font-size:12px;max-width:340px">${gBdg(x.g)}</td><td><b>${x.n}</b></td><td>${rchip(x.avg==null?null:Math.round(x.avg))}</td><td>${pbar(x.n/maxN*100,x.g===WG_NA?'#d97706':'#3b82f6',6)}</td></tr>`).join('')||'<tr><td colspan="4" style="color:#94a3b8;font-size:12px">Seçilmiş filtrlərə uyğun nəticə yoxdur</td></tr>'}</tbody></table></div></div>
    <div class="fc" style="gap:16px">
      <div class="card"><div class="card-hd"><span>Ən yaxşı reytinqlər (2025)</span>${bdg('TOP 5','green')}</div><div class="ovx">${miniT(best)}</div></div>
      <div class="card"><div class="card-hd"><span>Ən zəif reytinqlər (2025)</span>${bdg('SON 5','red')}</div><div class="ovx">${miniT(worst)}</div></div>
    </div>
  </div>
  <div class="card"><div class="card-hd"><span>İndikator matrisi — 2025 bal/dəyər və reytinq</span>${bdg(rows.length+' sətir','gray')}</div><div class="ovx"><table>
    <thead><tr>${['№','Kod','İndikator','GII sütunu','İşçi qrupu','İcra orqanı','Məsul şəxs','2025 Bal/Dəyər','2025 Reytinq','Qeyd'].map(h=>`<th>${h}</th>`).join('')}</tr></thead>
    <tbody>${rows.length?rows.map(d=>`<tr>
      <td style="color:#94a3b8">${d.no}</td>
      <td style="white-space:nowrap"><b>${d.code}</b></td>
      <td style="font-size:12px;min-width:170px">${esc(d.name)}</td>
      <td>${bdg(d.pillar+'. '+d.pillarName, d.pillar<=5?'blue':'purple')}</td>
      <td style="font-size:11px;max-width:230px">${d.groups.map(g=>gBdg(g)).join('<br>')}</td>
      <td style="font-size:11px;max-width:260px">${d.orgs.length?d.orgs.map(o=>esc(o)).join('<br>'):'—'}</td>
      <td style="font-size:11px;max-width:170px">${d.persons.length?d.persons.map(p=>esc(p)).join(', '):'—'}</td>
      <td style="white-space:nowrap"><b>${d.score2025==null?'n/a':esc(d.score2025)}</b></td>
      <td>${rchip(d.rank2025)}</td>
      <td style="font-size:11px;color:${d.notes?'#b45309':'#94a3b8'};max-width:200px">${d.notes?esc(d.notes):'—'}</td>
    </tr>`).join(''):`<tr><td colspan="10" style="padding:18px;text-align:center;color:#94a3b8;font-size:12px">Seçilmiş filtrlərə uyğun indikator tapılmadı. <button class="btn btn-sm btn-gray" onclick="wgReset()">Filtrləri sıfırla</button></td></tr>`}</tbody></table></div>
    <div style="padding:9px 15px;font-size:11px;color:#94a3b8;border-top:1px solid #f1f5f9">* «2025 Bal/Dəyər» WIPO ölkə profilindəki «Score/Value» sütununa uyğundur (indikator səviyyəsində xam dəyərlər müxtəlif ölçü vahidlərindədir). Reytinq 139 iqtisadiyyat üzrədir: <span style="color:#16a34a">≤46</span> · <span style="color:#d97706">47–93</span> · <span style="color:#dc2626">≥94</span>.</div></div>
</div>`;
}

// ── Main Render ──────────────────────────────────────────────────
function render(){
  const base=compute(S.pillars,null),scen=S.scenActive?compute(S.pillars,S.scenOver):null,active=scen||base;
  const{pd,inp,out,gii,tot,naC,has}=active;
  const TABS=[{id:'overview',l:'Overview'},{id:'structure',l:'Structure Builder'},{id:'indicators',l:'Indicator Management'},{id:'api',l:'API Configuration'},{id:'calc',l:'Calculation View'},{id:'analytics',l:'Analytics'},{id:'scenario',l:'Scenario Mode'},{id:'workgroups',l:'İşçi Qrupları 2025'}];
  let tc='';
  if(S.tab==='overview')   tc=tOverview(S.pillars,pd,inp,out,gii,tot,naC,has);
  if(S.tab==='structure')  tc=tStructure(S.pillars,tot);
  if(S.tab==='indicators') tc=tIndicators(S.pillars,pd);
  if(S.tab==='api')        tc=tApi(S.pillars);
  if(S.tab==='calc')       tc=tCalc(S.pillars,pd,inp,out,gii);
  if(S.tab==='analytics')  tc=tAnalytics(S.pillars,pd,tot,naC,has);
  if(S.tab==='scenario')   tc=tScenario(S.pillars,base,scen);
  if(S.tab==='workgroups') tc=tWorkgroups();
  document.getElementById('app').innerHTML=`
    <div class="header">
      <div class="header-top">
        <div>
          <div style="font-weight:700;font-size:15px;color:#0f172a">GII 2025 — Executive Scoring Dashboard</div>
          <div style="font-size:11px;color:#94a3b8">Global Innovation Index · Interactive Architecture Builder</div>
        </div>
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
          ${S.scenActive?bdg('SCENARIO ACTIVE','yellow'):''}
          <span style="background:#eff6ff;color:#2563eb;padding:4px 12px;border-radius:6px;font-size:12px;font-weight:700">GII: ${fmt(gii)}</span>
          <span style="background:${tot===78?'#f0fdf4':'#fffbeb'};color:${tot===78?'#16a34a':'#d97706'};padding:4px 12px;border-radius:6px;font-size:12px;font-weight:600">${tot}/78 Indicators</span>
          ${S.saveMsg==='save_ok'?bdg('✓ Yadda saxlanıldı','green'):S.saveMsg==='save_err'?bdg('✕ Saxlanmadı','red'):S.saveMsg==='export_ok'?bdg('✓ HTML endirildi','green'):S.saveMsg==='export_err'?bdg('✕ HTML yaradılmadı','red'):lastSavedAt?`<span style="font-size:10px;color:#94a3b8">Son saxlama: ${lastSavedAt.toLocaleTimeString('az')}</span>`:''}
          <button class="btn btn-green" onclick="doSave()" title="Dəyişiklikləri bu brauzerdə saxla">💾 SAVE</button>
          <button class="btn btn-blue" onclick="doExportHtml()" title="Cari dəyişiklikləri daxilində saxlayan paylaşılabilən HTML faylı endir">⬇ HTML endir</button>
        </div>
      </div>
      <div class="header-tabs">${TABS.map(t=>`<button class="tab-btn${S.tab===t.id?' active':''}" onclick="setTab('${t.id}')">${t.l}</button>`).join('')}</div>
    </div>
    <div class="content">
      ${S.saveMsg==='save_ok'?`<div class="ok-box" style="margin-bottom:14px;font-size:12px;color:#15803d"><b>Dəyişikliklər bu brauzerdə yadda saxlanıldı.</b> Fayl endirilmədi.</div>`:S.saveMsg==='save_err'?`<div class="warn" style="margin-bottom:14px;background:#fef2f2;border-color:#fecaca;color:#b91c1c;font-size:12px"><span>✕</span><div><b>Dəyişiklikləri brauzer yaddaşında saxlamaq mümkün olmadı.</b> Brauzer konsolundakı xətanı yoxlayın.</div></div>`:S.saveMsg==='export_ok'?`<div class="ok-box" style="margin-bottom:14px;font-size:12px;color:#15803d"><b>Dəyişikliklər HTML faylına daxil edildi.</b> Paylaşmaq üçün endirilmiş yeni HTML faylını göndərin.</div>`:S.saveMsg==='export_err'?`<div class="warn" style="margin-bottom:14px;background:#fef2f2;border-color:#fecaca;color:#b91c1c;font-size:12px"><span>✕</span><div><b>HTML faylının yaradılması mümkün olmadı.</b> Brauzer konsolundakı xətanı yoxlayın.</div></div>`:''}
      ${tc}
    </div>`;
}
initializeApplication();
</script>
